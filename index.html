
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Grammar Tree Drag Game</title>
  <style>
    :root {
      --card: #ffffff;
      --ink: #13233a;
      --accent: #4463ff;
      --accent-soft: #e5eaff;
      --ok: #198754;
      --bad: #cf2a2a;
      --border: #d9e0f5;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Inter", "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #f7f9ff, #eef3ff);
      color: var(--ink);
      min-height: 100vh;
      padding: 22px;
    }

    .container {
      max-width: 1380px;
      margin: 0 auto;
      display: grid;
      gap: 10px;
    }

    .panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      box-shadow: 0 8px 24px rgba(19, 35, 58, 0.07);
    }

    .panel h3 {
      margin: 8px 0;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 1.5rem;
    }

    .hint {
      margin: 0;
      line-height: 1.5;
      color: #364869;
    }

    .status {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      font-weight: 600;
    }

    .badge {
      background: var(--accent-soft);
      color: #2d44b5;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 0.9rem;
    }

    .badge.link-on {
      background: #dff7ea;
      color: #15603c;
    }

    .sentence {
      font-size: 1.05rem;
      line-height: 1.5;
    }

    .practice-controls {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
    }

    .practice-controls select {
      border: 1px solid #b8c7ff;
      border-radius: 10px;
      padding: 8px 10px;
      background: #fff;
      color: #14244d;
      font-weight: 600;
    }

    .mode-tip {
      margin: 0;
      font-size: 0.9rem;
      color: #4d5f88;
    }

    .word-bank {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      min-height: 58px;
      padding: 12px;
      border: 1px dashed #afbbe0;
      border-radius: 12px;
      background: #fbfcff;
    }

    .word {
      background: #fff;
      border: 1px solid #b8c7ff;
      border-radius: 10px;
      padding: 8px 12px;
      cursor: grab;
      font-weight: 600;
      user-select: none;
      box-shadow: 0 2px 8px rgba(68, 99, 255, 0.1);
      max-width: 100%;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .word:active {
      cursor: grabbing;
    }

    .zones {
      display: flex;
      flex-wrap: nowrap;
      gap: 12px;
      min-width: 100px
    }

    .zone-group {
      border: 2px solid #9fb0ee;
      border-radius: 14px;
      background: #f7f9ff;
      padding: 10px;
      display: grid;
      gap: 10px;
      grid-column: 1 / -1;
    }

    .zone-group h3 {
      margin: 0;
      font-size: 0.9rem;
      color: #243d94;
    }

    .zone-group .group-desc {
      margin: 0;
      font-size: 0.78rem;
      color: #566a99;
    }

    .zone-group-grid {
      display: flex;
      flex-wrap: nowrap;
      gap: 10px;
    }

    .zone.verb-cluster {
      border-style: solid;
      border-color: #cfd9ff;
      background: #f8faff;
    }

    .zone.linked {
      border-color: #3fbc7a;
      background: #ecfff5;
      box-shadow: 0 0 0 2px rgba(63, 188, 122, 0.18);
    }

    .zone.link-target::after {
      content: "Tense link active ✨";
      display: inline-block;
      margin-top: 8px;
      padding: 3px 8px;
      border-radius: 999px;
      font-size: 0.75rem;
      color: #0f6b3f;
      background: #dcfbe9;
      border: 1px solid #b7f0d1;
    }

    .zone {
      border: 2px dashed #b8c7ff;
      border-radius: 12px;
      min-height: 130px;
      padding: 5px;
      background: #fdfdff;
      transition: 0.2s ease;
      min-width: 100px
    }

    .zone.drag-over {
      border-color: var(--accent);
      background: #edf1ff;
      transform: translateY(-2px);
    }

    .zone h3 {
      margin: 0 0 6px;
      font-size: 0.95rem;
      color: #162441;
      line-height: 1.3;
    }

    .zone .desc {
      margin: 0 0 8px;
      font-size: 0.75rem;
      color: #5d6f94;
    }

    .slot {
      min-height: 58px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-content: flex-start;
      border-top: 1px solid #ecf0ff;
      padding-top: 8px;
    }

    .controls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    button {
      border: none;
      padding: 10px 14px;
      border-radius: 10px;
      font-weight: 700;
      cursor: pointer;
    }

    .primary {
      background: var(--accent);
      color: white;
    }

    .ghost {
      background: #eef3ff;
      color: #1f368f;
    }

    .result {
      min-height: 24px;
      font-weight: 700;
    }

    .ok {
      color: var(--ok);
    }

    .bad {
      color: var(--bad);
    }
  </style>
</head>

<body>
  <main class="container">
    <section class="panel" style="display: none;">
      <h3>语法树拆解训练 / Syntax Tree Trainer</h3>
      <p class="hint">
        新增“练习选项”模式：可切换主动/被动、情态、未来、条件句、虚拟语气、使役、完成进行、四类从句（名词性/定语/状语/表语）、倒装等形式。切换模式后，拖放区域会自动改成对应语法格式；并将 T 与 AUX 作为一个组合父框展示，V-head/Affix
        也会成组显示。
      </p>
    </section>

    <section class="panel practice-controls">
      <label for="modeSelect"><strong>练习选项 Practice Mode:</strong></label>
      <select id="modeSelect" aria-label="Practice mode selector"></select>
      <p class="mode-tip" style="display: none;" id="modeTip"></p>
      <span class="badge" id="roundLabel">Round 1</span>
      <span class="badge" id="targetLabel">Target: ...</span>
      <span class="badge" id="scoreLabel">Score: 0 / 0</span>
      <span class="badge" id="linkLabel">T↔Affix: Inactive</span>
    </section>



    <section class="panel">
      <h3>Word Bank (词库)</h3>
      <section class=" sentence" style="margin-bottom: 5px;" id="prompt"></section>
      <div id="wordBank" class="word-bank" aria-label="Draggable words"></div>
    </section>

    <section class="panel">
      <h3>Grammar Tree Zones (语法结构区)</h3>
      <div class="zones" id="zones"></div>
    </section>

    <section class="panel controls">
      <button class="primary" id="checkBtn">Check Answer (检查答案)</button>
      <button class="ghost" id="resetBtn">Reset Round (重置本轮)</button>
      <button class="ghost" id="nextBtn">Next Round (下一轮)</button>
      <p class="result" id="result"></p>
    </section>
  </main>

  <script>
    const PRACTICE_MODES = [
      {
        id: "core",
        label: "基础：主动/被动与体貌",
        tip: "将 AUX 精细拆分为 Modal/Perfect/Progressive/Passive/Do，避免多个词混放在同一 AUX 区。",
        zones: [
          { id: "DP-subj", title: "DP-subj (主语 Subject)", desc: "Subject DP" },
          { id: "T", title: "T (时态 Tense)", desc: "Present / past feature" },
          { id: "Modal-Aux", title: "Modal Aux (情态)", desc: "will / can / may / must / should / might / could" },
          { id: "Perfect-Aux", title: "Perfect Aux (完成体)", desc: "have / has / had + 过去分词" },
          { id: "Progressive-Aux", title: "Progressive Aux (进行体)", desc: "be + V-ing" },
          { id: "Passive-Aux", title: "Passive Aux (被动)", desc: "be + 过去分词" },
          { id: "Do-Aux", title: "Do Aux (助动词do)", desc: "do / does / did" },
          { id: "Neg", title: "NegP (否定)", desc: "not / never" },
          { id: "V-head", title: "V-head (主动词)", desc: "Verb root" },
          { id: "Affix", title: "Affix (词缀)", desc: "-s / -ed / -ing / -en" },
          { id: "DP-obj", title: "DP-obj (宾语)", desc: "Object DP" },
          { id: "PP", title: "PP (介词短语)", desc: "by-phrase etc." }
        ],
        templates: [
          {
            prompt: "ACTIVE · Present Simple: 'The chef cooks the meal.'",
            target: "Active · Present Simple",
            words: [
              { text: "The chef", type: "DP-subj" },
              { text: "(present)", type: "T" },
              { text: "cook", type: "V-head" },
              { text: "-s", type: "Affix" },
              { text: "the meal", type: "DP-obj" }
            ]
          },
          {
            prompt: "PASSIVE · Present Simple: 'The meal is cooked by the chef.'",
            target: "Passive · Present Simple",
            words: [
              { text: "The meal", type: "DP-subj" },
              { text: "(present)", type: "T" },
              { text: "is", type: "Passive-Aux" },
              { text: "cook", type: "V-head" },
              { text: "-en", type: "Affix" },
              { text: "by the chef", type: "PP" }
            ]
          },
          {
            prompt: "MULTI-AUX PASSIVE PERFECT: 'It has been eaten.'",
            target: "Passive · Present Perfect",
            words: [
              { text: "It", type: "DP-subj" },
              { text: "(present)", type: "T" },
              { text: "has", type: "Perfect-Aux" },
              { text: "been", type: "Passive-Aux" },
              { text: "eat", type: "V-head" },
              { text: "-en", type: "Affix" }
            ]
          },
          {
            prompt: "NEGATION: 'I did not eat the cake.'",
            target: "Active · Past Simple with Negation",
            words: [
              { text: "I", type: "DP-subj" },
              { text: "(past)", type: "T" },
              { text: "did", type: "Do-Aux" },
              { text: "not", type: "Neg" },
              { text: "eat", type: "V-head" },
              { text: "the cake", type: "DP-obj" }
            ]
          },
          {
            prompt: "PERFECT PROGRESSIVE: 'She has been reading.'",
            target: "Active · Present Perfect Progressive",
            words: [
              { text: "She", type: "DP-subj" },
              { text: "(present)", type: "T" },
              { text: "has", type: "Perfect-Aux" },
              { text: "been", type: "Progressive-Aux" },
              { text: "read", type: "V-head" },
              { text: "-ing", type: "Affix" }
            ]
          }
        ]
      },
      {
        id: "interrogative",
        label: "Interrogatives (疑问句 / CP结构)",
        tip: "参考 CP → Spec-CP + C'（C + TP）：陈述句可放空 C（∅），疑问句通常把疑问词放到 Spec-CP、助动词放到 C。",
        zones: [
          { id: "Spec-CP", title: "Spec-CP", desc: "疑问词位置 (what / who / where)" },
          { id: "C", title: "C (Complementizer/Operator)", desc: "that / if / whether / do-support / 助动词" },
          { id: "TP-Subj", title: "TP: Subject", desc: "句子核心中的主语" },
          { id: "TP-V", title: "TP: Predicate", desc: "句子核心中的谓语动词" },
          { id: "TP-Obj", title: "TP: Object/Complement", desc: "句子核心中的宾语/补足语" }
        ],
        templates: [
          {
            prompt: "DECLARATIVE with null C: 'The boy eats an apple.'",
            target: "CP structure · Declarative (C = ∅)",
            words: [
              { text: "∅ (null C)", type: "C" },
              { text: "The boy", type: "TP-Subj" },
              { text: "eats", type: "TP-V" },
              { text: "an apple", type: "TP-Obj" }
            ]
          },
          {
            prompt: "WH-QUESTION: 'What does the boy eat?'",
            target: "CP structure · WH-question",
            words: [
              { text: "what", type: "Spec-CP" },
              { text: "does", type: "C" },
              { text: "the boy", type: "TP-Subj" },
              { text: "eat", type: "TP-V" }
            ]
          },
          {
            prompt: "YES/NO QUESTION: 'Does the boy eat an apple?'",
            target: "CP structure · Yes/No question",
            words: [
              { text: "does", type: "C" },
              { text: "the boy", type: "TP-Subj" },
              { text: "eat", type: "TP-V" },
              { text: "an apple", type: "TP-Obj" }
            ]
          }
        ]
      },
      {
        id: "modal",
        label: "Modal Verbs (情态动词)",
        tip: "采用基础结构区配置，支持更多复杂的情态动词时态。模板：情态完成时 / 情态进行时 / 情态被动语态",
        zones: [
          { id: "DP-subj", title: "DP-subj (主语 Subject)", desc: "Subject DP" },
          { id: "T", title: "T (时态 Tense)", desc: "Present / past feature" },
          { id: "Modal-Aux", title: "Modal Aux (情态)", desc: "can / could / should / may / must" },
          { id: "Perfect-Aux", title: "Perfect Aux (完成体)", desc: "have (完成时的辅助动词)" },
          { id: "Progressive-Aux", title: "Progressive Aux (进行体)", desc: "be (进行时的辅助动词)" },
          { id: "Passive-Aux", title: "Passive Aux (被动)", desc: "be (被动语态的辅助动词)" },
          { id: "V-head", title: "V-head (主动词)", desc: "Verb root" },
          { id: "Affix", title: "Affix (词缀)", desc: "-ing / -ed / -en" },
          { id: "DP-obj", title: "DP-obj (宾语)", desc: "Object DP" },
          { id: "AdvP", title: "AdvP (副词短语)", desc: "harder / carefully / easily" },
          { id: "PP", title: "PP (介词短语)", desc: "by tomorrow / by the manager etc." }
        ],
        templates: [
          {
            prompt: "MODAL PERFECT (情态完成时): 'You should have studied harder.'",
            target: "Active · Modal Perfect",
            words: [
              { text: "You", type: "DP-subj" },
              { text: "(past)", type: "T" },
              { text: "should", type: "Modal-Aux" },
              { text: "have", type: "Perfect-Aux" },
              { text: "study", type: "V-head" },
              { text: "-ed", type: "Affix" },
              { text: "harder", type: "AdvP" }
            ]
          },
          {
            prompt: "MODAL PROGRESSIVE (情态进行时): 'You should be listening carefully.'",
            target: "Active · Modal Progressive",
            words: [
              { text: "You", type: "DP-subj" },
              { text: "(present)", type: "T" },
              { text: "should", type: "Modal-Aux" },
              { text: "be", type: "Progressive-Aux" },
              { text: "listen", type: "V-head" },
              { text: "-ing", type: "Affix" },
              { text: "carefully", type: "AdvP" }
            ]
          },
          {
            prompt: "MODAL PASSIVE (情态被动语态): 'The report should be completed by tomorrow.'",
            target: "Passive · Modal Present",
            words: [
              { text: "The report", type: "DP-subj" },
              { text: "(present)", type: "T" },
              { text: "should", type: "Modal-Aux" },
              { text: "be", type: "Passive-Aux" },
              { text: "complete", type: "V-head" },
              { text: "-ed", type: "Affix" },
              { text: "by tomorrow", type: "PP" }
            ]
          }
        ]
      },
      {
        id: "future",
        label: "Future Tenses (未来时态)",
        tip: "采用基础结构区配置，支持更多复杂的将来时态。模板：将来进行时 / 将来完成时 / 将来被动时",
        zones: [
          { id: "DP-subj", title: "DP-subj (主语 Subject)", desc: "Subject DP" },
          { id: "T", title: "T (时态 Tense)", desc: "will (表示将来时)" },
          { id: "Perfect-Aux", title: "Perfect Aux (完成体)", desc: "have (完成时的辅助动词)" },
          { id: "Progressive-Aux", title: "Progressive Aux (进行体)", desc: "be (进行时的辅助动词)" },
          { id: "Passive-Aux", title: "Passive Aux (被动)", desc: "be (被动语态的辅助动词)" },
          { id: "V-head", title: "V-head (主动词)", desc: "Verb root" },
          { id: "Affix", title: "Affix (词缀)", desc: "-ing / -ed / -en / -d" },
          { id: "DP-obj", title: "DP-obj (宾语)", desc: "Object DP" },
          { id: "PP", title: "PP (介词短语)", desc: "by tomorrow / at 8 PM etc." }
        ],
        templates: [
          {
            prompt: "FUTURE PROGRESSIVE (将来进行时): 'I will be studying at 8 PM.'",
            target: "Active · Future Progressive",
            words: [
              { text: "I", type: "DP-subj" },
              { text: "will", type: "T" },
              { text: "be", type: "Progressive-Aux" },
              { text: "study", type: "V-head" },
              { text: "-ing", type: "Affix" },
              { text: "at 8 PM", type: "PP" }
            ]
          },
          {
            prompt: "FUTURE PERFECT (将来完成时): 'By next year, I will have graduated.'",
            target: "Active · Future Perfect",
            words: [
              { text: "By next year", type: "PP" },
              { text: "I", type: "DP-subj" },
              { text: "will", type: "T" },
              { text: "have", type: "Perfect-Aux" },
              { text: "graduate", type: "V-head" },
              { text: "-d", type: "Affix" }
            ]
          },
          {
            prompt: "FUTURE PASSIVE (将来被动时): 'The report will be finished by tomorrow.'",
            target: "Passive · Future Simple",
            words: [
              { text: "The report", type: "DP-subj" },
              { text: "will", type: "T" },
              { text: "be", type: "Passive-Aux" },
              { text: "finish", type: "V-head" },
              { text: "-ed", type: "Affix" },
              { text: "by tomorrow", type: "PP" }
            ]
          }
        ]
      },
      {
        id: "conditional",
        label: "Conditional Sentences (条件句)",
        tip: "模板：Conditional · Present / Conditional · Past",
        zones: [
          { id: "If-Clause", title: "If-Clause", desc: "Condition clause" },
          { id: "Main-Clause", title: "Main-Clause", desc: "Result clause" },
          { id: "Tense-Marker", title: "Tense Marker", desc: "present / past" }
        ],
        templates: [
          {
            prompt: "If he studies, he will pass.",
            target: "Conditional · Present",
            words: [
              { text: "If he studies", type: "If-Clause" },
              { text: "present", type: "Tense-Marker" },
              { text: "he will pass", type: "Main-Clause" }
            ]
          },
          {
            prompt: "If he had studied, he would have passed.",
            target: "Conditional · Past",
            words: [
              { text: "If he had studied", type: "If-Clause" },
              { text: "past perfect", type: "Tense-Marker" },
              { text: "he would have passed", type: "Main-Clause" }
            ]
          }
        ]
      },
      {
        id: "subjunctive",
        label: "Subjunctive Mood (虚拟语气)",
        tip: "模板：Subjunctive · Present / Subjunctive · Past",
        zones: [
          { id: "Trigger", title: "Trigger", desc: "wish / suggest / demand" },
          { id: "Subj-Clause", title: "Subjunctive Clause", desc: "counterfactual/proposal" },
          { id: "Mood", title: "Mood Feature", desc: "present / past subjunctive" }
        ],
        templates: [
          {
            prompt: "I suggest that he be on time.",
            target: "Subjunctive · Present",
            words: [
              { text: "I suggest", type: "Trigger" },
              { text: "present subjunctive", type: "Mood" },
              { text: "that he be on time", type: "Subj-Clause" }
            ]
          },
          {
            prompt: "I wish she were here.",
            target: "Subjunctive · Past",
            words: [
              { text: "I wish", type: "Trigger" },
              { text: "past subjunctive", type: "Mood" },
              { text: "she were here", type: "Subj-Clause" }
            ]
          }
        ]
      },
      {
        id: "causative",
        label: "Causative Verbs (使役动词)",
        tip: "模板：Causative · Perfect Passive",
        zones: [
          { id: "Agent", title: "Causer", desc: "Subject causing action" },
          { id: "Causative", title: "Causative Verb", desc: "have / get" },
          { id: "Theme", title: "Theme/Object", desc: "Affected object" },
          { id: "PastPart", title: "Past Participle", desc: "washed / repaired" }
        ],
        templates: [
          {
            prompt: "He had his car washed.",
            target: "Causative · Perfect Passive",
            words: [
              { text: "He", type: "Agent" },
              { text: "had", type: "Causative" },
              { text: "his car", type: "Theme" },
              { text: "washed", type: "PastPart" }
            ]
          }
        ]
      },
      {
        id: "clauses",
        label: "Clauses (四类从句)",
        tip: "模板：名词性从句 / 定语从句 / 状语从句 / 表语从句",
        zones: [
          { id: "Clause-Type", title: "Clause Type", desc: "Noun / Relative / Adverbial / Complement" },
          { id: "Matrix-Part", title: "Matrix Part", desc: "Main clause frame" },
          { id: "Connector", title: "Connector", desc: "what / that / when / whether ..." },
          { id: "Sub-Clause", title: "Subordinate Clause", desc: "embedded clause content" }
        ],
        templates: [
          {
            prompt: "What you said is important.",
            target: "Noun Clause (名词性从句)",
            words: [
              { text: "Noun Clause", type: "Clause-Type" },
              { text: "is important", type: "Matrix-Part" },
              { text: "what", type: "Connector" },
              { text: "you said", type: "Sub-Clause" }
            ]
          },
          {
            prompt: "The book that he bought is interesting.",
            target: "Relative Clause (定语从句)",
            words: [
              { text: "Relative Clause", type: "Clause-Type" },
              { text: "The book is interesting", type: "Matrix-Part" },
              { text: "that", type: "Connector" },
              { text: "he bought", type: "Sub-Clause" }
            ]
          },
          {
            prompt: "I will call you when I arrive.",
            target: "Adverbial Clause (状语从句)",
            words: [
              { text: "Adverbial Clause", type: "Clause-Type" },
              { text: "I will call you", type: "Matrix-Part" },
              { text: "when", type: "Connector" },
              { text: "I arrive", type: "Sub-Clause" }
            ]
          },
          {
            prompt: "The problem is whether we can finish it in time.",
            target: "Complement Clause (表语从句)",
            words: [
              { text: "Complement Clause", type: "Clause-Type" },
              { text: "The problem is", type: "Matrix-Part" },
              { text: "whether", type: "Connector" },
              { text: "we can finish it in time", type: "Sub-Clause" }
            ]
          }
        ]
      },
      {
        id: "inversion",
        label: "Inversion (倒装语序)",
        tip: "模板：Inversion · Negative",
        zones: [
          { id: "Fronted-Neg", title: "Fronted Negative", desc: "Never / Rarely / Seldom" },
          { id: "Modal-Aux", title: "Modal/Operator Aux (倒装助动词)", desc: "have / do / can" },
          { id: "DP-subj", title: "DP-subj", desc: "Subject" },
          { id: "VP", title: "VP", desc: "Main predicate" }
        ],
        templates: [
          {
            prompt: "Never have I seen such a beautiful sight.",
            target: "Inversion · Negative",
            words: [
              { text: "Never", type: "Fronted-Neg" },
              { text: "have", type: "Modal-Aux" },
              { text: "I", type: "DP-subj" },
              { text: "seen such a beautiful sight", type: "VP" }
            ]
          }
        ]
      }
    ];

    let currentModeId = PRACTICE_MODES[0].id;
    let round = 0;
    let correctCount = 0;
    let totalChecks = 0;

    const promptEl = document.getElementById("prompt");
    const targetLabel = document.getElementById("targetLabel");
    const roundLabel = document.getElementById("roundLabel");
    const scoreLabel = document.getElementById("scoreLabel");
    const linkLabel = document.getElementById("linkLabel");
    const wordBank = document.getElementById("wordBank");
    const zonesEl = document.getElementById("zones");
    const resultEl = document.getElementById("result");
    const modeSelect = document.getElementById("modeSelect");
    const modeTip = document.getElementById("modeTip");

    function shuffle(arr) {
      return [...arr].sort(() => Math.random() - 0.5);
    }

    function getCurrentMode() {
      return PRACTICE_MODES.find((mode) => mode.id === currentModeId) || PRACTICE_MODES[0];
    }

    function buildModeOptions() {
      modeSelect.innerHTML = "";
      for (const mode of PRACTICE_MODES) {
        const option = document.createElement("option");
        option.value = mode.id;
        option.textContent = mode.label;
        modeSelect.appendChild(option);
      }
      modeSelect.value = currentModeId;
    }

    function createZoneCard(zone) {
      const wrapper = document.createElement("article");
      wrapper.className = "zone";
      wrapper.dataset.zone = zone.id;
      if (zone.id.includes("V") || zone.id === "Affix") {
        wrapper.classList.add("verb-cluster");
      }
      wrapper.innerHTML = `
        <h3>${zone.title}</h3>
        <p class="desc">${zone.desc}</p>
        <div class="slot"></div>
      `;

      wrapper.addEventListener("dragover", (event) => {
        event.preventDefault();
        wrapper.classList.add("drag-over");
      });

      wrapper.addEventListener("dragleave", () => {
        wrapper.classList.remove("drag-over");
      });

      wrapper.addEventListener("drop", (event) => {
        event.preventDefault();
        wrapper.classList.remove("drag-over");
        const id = event.dataTransfer.getData("text/plain");
        const dragged = document.getElementById(id);
        if (dragged) {
          wrapper.querySelector(".slot").appendChild(dragged);
          updateTenseLinkState();
        }
      });

      return wrapper;
    }

    function buildZones(mode) {
      zonesEl.innerHTML = "";
      const zoneMap = new Map(mode.zones.map((zone) => [zone.id, zone]));

      const auxIds = mode.zones
        .map((zone) => zone.id)
        .filter((id) => id === "T" || id.endsWith("-Aux"));
      const verbFormIds = mode.zones
        .map((zone) => zone.id)
        .filter((id) => id === "V-head" || id === "Affix");

      const groups = [];
      if (auxIds.length >= 2) {
        groups.push({
          id: "tense-aux",
          title: "T + AUX Group (时态与助动词组)",
          desc: "把 T 与各类 AUX 放在一个父级线框中；每个子框功能独立、单独判定。",
          members: auxIds
        });
      }
      if (verbFormIds.length >= 2) {
        groups.push({
          id: "verb-form",
          title: "Verb Form Group (动词形式组)",
          desc: "V-head 与 Affix 归为一组，便于观察词根与词缀配合。",
          members: verbFormIds
        });
      }

      const renderedGroups = new Set();
      for (const zone of mode.zones) {
        const parentGroup = groups.find((g) => g.members.includes(zone.id));
        if (parentGroup) {
          if (!renderedGroups.has(parentGroup.id)) {
            const groupEl = document.createElement("section");
            groupEl.className = "zone-group";
            groupEl.dataset.group = parentGroup.id;
            groupEl.innerHTML = `
              <h3>${parentGroup.title}</h3>
              <p class="group-desc">${parentGroup.desc}</p>
              <div class="zone-group-grid"></div>
            `;
            const innerGrid = groupEl.querySelector(".zone-group-grid");
            for (const zoneId of parentGroup.members) {
              const z = zoneMap.get(zoneId);
              if (z) innerGrid.appendChild(createZoneCard(z));
            }
            zonesEl.appendChild(groupEl);
            renderedGroups.add(parentGroup.id);
          }
        } else {
          zonesEl.appendChild(createZoneCard(zone));
        }
      }
    }

    function createWordCard(word, idx) {
      const card = document.createElement("div");
      card.className = "word";
      card.draggable = true;
      card.id = `word-${currentModeId}-${round}-${idx}`;
      card.textContent = word.text;
      card.dataset.type = word.type;

      card.addEventListener("dragstart", (event) => {
        event.dataTransfer.setData("text/plain", card.id);
      });

      card.addEventListener("dblclick", () => {
        wordBank.appendChild(card);
        updateTenseLinkState();
      });

      return card;
    }

    function loadRound(index) {
      const mode = getCurrentMode();
      const template = mode.templates[index];
      resultEl.textContent = "";
      resultEl.className = "result";

      promptEl.textContent = template.prompt;
      targetLabel.textContent = `Target: ${template.target}`;
      roundLabel.textContent = `Round ${index + 1} / ${mode.templates.length}`;
      scoreLabel.textContent = `Score: ${correctCount} / ${totalChecks}`;
      modeTip.textContent = mode.tip;
      linkLabel.textContent = "T↔Affix: Inactive";
      linkLabel.classList.remove("link-on");

      buildZones(mode);
      wordBank.innerHTML = "";

      for (const [i, word] of shuffle(template.words).entries()) {
        wordBank.appendChild(createWordCard(word, i));
      }
      updateTenseLinkState();
    }

    function hasWordsInZone(zoneId) {
      const zone = document.querySelector(`.zone[data-zone="${zoneId}"] .slot`);
      return zone && zone.children.length > 0;
    }

    function updateTenseLinkState() {
      const tZone = document.querySelector('.zone[data-zone="T"]');
      const affixZone = document.querySelector('.zone[data-zone="Affix"]');
      if (!tZone || !affixZone) {
        linkLabel.textContent = "T↔Affix: N/A";
        linkLabel.classList.remove("link-on");
        return;
      }

      const active = hasWordsInZone("T") && hasWordsInZone("Affix");
      tZone.classList.toggle("linked", active);
      affixZone.classList.toggle("linked", active);
      affixZone.classList.toggle("link-target", active);
      linkLabel.textContent = active ? "T↔Affix: Active ✨" : "T↔Affix: Inactive";
      linkLabel.classList.toggle("link-on", active);
    }

    function evaluateRound() {
      const template = getCurrentMode().templates[round];
      const cards = [...document.querySelectorAll(".word")];

      if (cards.some((card) => card.parentElement === wordBank)) {
        resultEl.textContent = "Please place all words into zones before checking. (请将所有单词拖入区域后再检查)";
        resultEl.className = "result bad";
        return;
      }

      let correct = true;
      for (const card of cards) {
        const zone = card.closest(".zone");
        if (!zone || zone.dataset.zone !== card.dataset.type) {
          correct = false;
          break;
        }
      }

      totalChecks += 1;
      if (correct) {
        correctCount += 1;
        resultEl.textContent = `Correct! ${template.target} (完全正确！)`;
        resultEl.className = "result ok";
      } else {
        resultEl.textContent = "Not correct yet. Re-check your placements. (还不对哦，请重新检查单词的位置)";
        resultEl.className = "result bad";
      }

      scoreLabel.textContent = `Score: ${correctCount} / ${totalChecks}`;
    }

    modeSelect.addEventListener("change", (event) => {
      currentModeId = event.target.value;
      round = 0;
      loadRound(round);
    });

    document.getElementById("checkBtn").addEventListener("click", evaluateRound);
    document.getElementById("resetBtn").addEventListener("click", () => loadRound(round));
    document.getElementById("nextBtn").addEventListener("click", () => {
      const total = getCurrentMode().templates.length;
      round = (round + 1) % total;
      loadRound(round);
    });

    buildModeOptions();
    loadRound(round);
  </script>
</body>

</html>
